# Common platform-agnostic tmux configuration

# Reset to default bindings
unbind -a
source ~/.config/tmux/0-default.conf
source ~/.config/tmux/styles.conf

# more natural prefix
unbind C-b
set -g prefix 'M-\'    # right hand
bind 'M-\' send-prefix
set -g prefix2 M-`     # left hand lol
bind 'M-`' send-prefix

# colors
# set -g default-terminal "xterm-256color"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

# quick escape for Neovim under Tmux. See the following:
# https://github.com/neovim/neovim/issues/2035, and
# https://github.com/neovim/neovim/wiki/FAQ#esc-in-tmux-or-gnu-screen-is-delayed
set -g escape-time 10
set -g focus-events on # Remove Vim mode delays and for vimpostor/vim-tpipeline
set -g allow-passthrough on # let apps send escape sequences to the outer terminal

# mouse
set -g mouse on
bind m set-option -gF mouse "#{?mouse,off,on}" \; display-message -p "Mouse: #{?mouse,ON,OFF}"

# the visual stuff is annoying but monitoring is handy
# if i forget about a process in another window
set -g monitor-activity on
set -g monitor-bell on
set -g monitor-silence 0
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# misc settings, idk
set -g default-command "zsh"
set -g status-keys emacs # emacs style bindings in status/command line
setw -g aggressive-resize off
setw -g clock-mode-style  12
set -g history-limit 50000

# for any repeat bindings (i.e. bind -r)
# how long until the prefix is no longer valid, to allow multiple commands to be input
# without having to press the prefix again, useful for resizing in particular
set -g initial-repeat-time 1000
set -g repeat-time 500

# edit and reload tmux config while tmux is running
bind e split-window -h '\
    f=~/.config/tmux/core.conf && \
    printf "\033]2;%s\033\\" "$f" && \
    vi "$f" && \
    tmux source "$f"
'
bind r source ~/.config/tmux/core.conf

# Unbind default keys
unbind C-b
unbind '"'
unbind %
bind Space choose-tree -Z # interactive session/window/pane picker

# pane settings
# more hand friendly to 1 index
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g display-panes-active-colour yellow # when running tmux display-panes (prefix+q)
set -g display-panes-time 4000

# more obvious splits
bind "\\" split-window -h -c "#{pane_current_path}"
bind -    split-window -v -c "#{pane_current_path}"
# full window width or height splits
bind | split-window -fh -c "#{pane_current_path}"
bind _ split-window -fv -c "#{pane_current_path}"

# vim style pane resizing
bind -r -T prefix h resize-pane -L
bind -r -T prefix j resize-pane -D
bind -r -T prefix k resize-pane -U
bind -r -T prefix l resize-pane -R

# easier resizing, without having to prefix first, e.g. Alt+(Uppercase Vim key)
# repeat unnecessary because it's on root table
bind -T root M-H resize-pane -L 5
bind -T root M-J resize-pane -D 5 # resize less ? in vertical directions because
bind -T root M-K resize-pane -U 5 # there is usually less vertical space
bind -T root M-L resize-pane -R 5

# use Alt-vim keys without prefix key to switch panes
# if the pane is running vim/nvim, forward the key to it instead
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -T root M-h if-shell "$is_vim" 'send-keys M-h' 'set @nav_dir h; select-pane -L'
bind -T root M-j if-shell "$is_vim" 'send-keys M-j' 'set @nav_dir j; select-pane -D'
bind -T root M-k if-shell "$is_vim" 'send-keys M-k' 'set @nav_dir k; select-pane -U'
bind -T root M-l if-shell "$is_vim" 'send-keys M-l' 'set @nav_dir l; select-pane -R'
# use Alt-arrow keys without prefix key to switch panes
# forward as M-hjkl so vim receives keys it already handles
bind -T root M-Left  if-shell "$is_vim" 'send-keys M-h' 'set @nav_dir h; select-pane -L'
bind -T root M-Down  if-shell "$is_vim" 'send-keys M-j' 'set @nav_dir j; select-pane -D'
bind -T root M-Up    if-shell "$is_vim" 'send-keys M-k' 'set @nav_dir k; select-pane -U'
bind -T root M-Right if-shell "$is_vim" 'send-keys M-l' 'set @nav_dir l; select-pane -R'
# 
bind -T root M-i select-pane -l     # last pane
bind -T root M-o select-pane -t :.+ # cycle through panes

