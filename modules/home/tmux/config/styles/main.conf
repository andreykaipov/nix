# vim: filetype=tmux
#
# Just the styles. The color variables are set from nvim/lua/plugins.tmux.lua.
# See https://github.com/andreykaipov/tmux-colorscheme-sync.nvim.
#
# host.conf (pane style, border style, status bg) is sourced from core.conf
# BEFORE this file, so %if conditionals see the correct values at parse time.
#
# Source cached @nvim_color_* values so tmux has the right colorscheme before
# nvim starts. The cache is written by the nvim plugin on every colorscheme
# change. If it doesn't exist yet (first boot), styles will use empty defaults
# until nvim opens.
if '[ -f ~/.config/tmux/styles/nvim-colors.conf ]' {
    source ~/.config/tmux/styles/nvim-colors.conf
}

# status
status_color_fg="#{@nvim_color_constant_fg}"
status_color_bg="#{@nvim_color_tabline_bg}"
status_edge_color_fg="#{@nvim_color_constant_fg}"
%if "#{==:#{@host_status_bg},active}"
status_edge_color_bg="#{@nvim_color_normal_bg}"
%else
status_edge_color_bg="#{@nvim_color_normal_lighter_bg}"
%endif
client_prefix_style="#[fg=black#,bg=#{@nvim_color_constant_fg}]"
# pane
pane_fg="default"
pane_bg="#{@nvim_color_normal_lighter_bg}" # slightly lighter than active pane for a faded look
active_pane_fg="default"
active_pane_bg="#{@nvim_color_normal_bg}" # black
popup_pane_fg="default"
popup_pane_bg="#{@nvim_color_normal_bg}"
# border
active_pane_border_fg="$active_pane_bg"
pane_border_fg="#{@nvim_color_normal_bg}"
pane_border_bg="$pane_bg"
popup_pane_border_fg="#{@nvim_color_constant_fg}"
popup_pane_border_bg="$popup_pane_bg"

# Use @host_pane_style directly (unset/empty = subtle = default)
%if "#{==:#{@host_pane_style},chunky}"
    active_pane_border_bg="$active_pane_bg"
%else
    active_pane_border_bg="$pane_bg"
%endif
# Use @host_pane_border_style directly (unset/empty = all = default)
%if "#{==:#{@host_pane_border_style},none}"
    pane_border_fg="$pane_border_bg"
    active_pane_border_fg="$active_pane_border_bg"
%else
    active_pane_border_fg="$active_pane_border_fg"
%endif

# status line styles
%if "#{==:#{@transparent},on}"
status_bg="default"
window_status_bg="default"
pane_style_bg="default"
active_pane_style_bg="default"
popup_style_bg="default"
border_pane_fg="$active_pane_bg"
border_pane_bg="default"
border_active_fg="$active_pane_border_fg"
border_active_bg="default"
border_popup_fg="$active_pane_bg" #"#{@nvim_color_identifier_fg}"
border_popup_bg="$active_pane_bg"
%else
status_bg="$status_edge_color_bg"
window_status_bg="$status_color_bg"
pane_style_bg="$pane_bg"
active_pane_style_bg="$active_pane_bg"
popup_style_bg="$popup_pane_bg"
border_pane_fg="$pane_border_fg"
border_pane_bg="$pane_border_bg"
border_active_fg="$active_pane_border_fg"
border_active_bg="$active_pane_border_bg"
border_popup_fg="$popup_pane_border_bg"
border_popup_bg="$popup_pane_border_bg"
%endif
set -g status-style "fg=default,bg=$status_bg"
set -g status-left-style "fg=$status_edge_color_fg,bg=$status_bg"
set -g status-right-style "fg=$status_edge_color_fg,bg=$status_bg"
set -g window-status-style "fg=$status_color_fg,bg=$window_status_bg"
set -g window-status-current-style "fg=$status_color_fg,bg=$window_status_bg reverse"
set -g window-status-activity-style "fg=$status_color_fg,bg=$window_status_bg blink"
set -g window-status-bell-style "fg=$status_color_fg,bg=$window_status_bg blink"
set -g window-status-last-style "fg=$status_color_fg,bg=$window_status_bg"
# pane styles
set -g window-style "fg=$pane_fg,bg=$pane_style_bg"
set -g window-active-style "fg=$active_pane_fg,bg=$active_pane_style_bg"
set -g popup-style "fg=$popup_pane_fg,bg=$popup_style_bg"
# border colors
set -g pane-border-style "fg=$border_pane_fg,bg=$border_pane_bg"
set -g pane-active-border-style "fg=$border_active_fg,bg=$border_active_bg"
set -g popup-border-style "fg=$border_popup_fg,bg=$border_popup_bg"

# The OS window title, but Wezterm lets us remove it :)
set -g set-titles off
set -g set-titles-string "Terminal: #S.#I:#P #{session_alerts}"

# status line
#
# symbols like     would be fun but the styling becomes very annoying to maintain
# since we have toggle the styling on and off in the status-format for it actually show up in the intended way
# from: https://www.nerdfonts.com/cheat-sheet
#
# status line options
# TODO: experiment with just getting rid of the status entirely
set -g status on
set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 3 # status line window names
set -g window-status-format " #{?window_zoomed_flag,🔍,#{window_index}} #{window_name} "
set -g window-status-current-format "#{E:window-status-format}"
set -g window-status-separator '   ' # ' • '
set -g status-left "#{?client_prefix,$client_prefix_style,}  #S #[fg=default,bg=default] "
set -g status-right-length 80
set -g status-right "" #"   %a %b %d %H:%M "

# borders
#
# border options
set -g pane-border-status off
set -g pane-border-format "#{pane_title}" # previously be managed by zsh hooks and vim-tpipeline
set -g pane-border-indicators off
set -g pane-border-lines single
set -g popup-border-lines single

# pane-border-status is off, so we won't ever see the pane-border-format
# however, if we do want to turn on titles, we can use these commands.
# e.g., the idea is they might be handy to enable when pairing/demoing:
bind -T prefix T run 'zsh -c "arr=( off top ) && tmux setw pane-border-status \${arr[\$(( \${arr[(I)#{pane-border-status}]} % 2 + 1 ))]}"'
bind -T prefix t command-prompt -p "(rename-pane)" -I "#T" "select-pane -T '%%'"

# a pane's default title is the machine hostname
# afaik, it must be set programatically, so the following hooks do that
# to avoid seeing unnecessary info everywhere
set-hook -g after-split-window[0] "select-pane -T \"\""
set-hook -g after-new-window[0] "select-pane -T \"\""
set-hook -g after-new-session[0] "select-pane -T \"\""

# restore active pane style after a popup closes (popup steals focus, pane-focus-in
# fires when it returns). this is idempotent for normal pane switches since
# window-active-style is already correct in that case.
# When @transparent is on, use default bg so terminal transparency shows through.
set-hook -g pane-focus-in[0] "\
    if -F '#{==:#{@transparent},on}' '\
        set -g pane-active-border-style \"fg=#{@nvim_color_constant_fg}\" ; \
        set -g pane-border-indicators arrows ; \
        run -b \"sleep 0.25 && \
            tmux set -g pane-active-border-style \\\"fg=$border_active_fg,bg=$border_active_bg\\\" && \
            tmux set -g pane-border-indicators off\" ; \
        set -g window-active-style \"bg=default\"' '\
        set -g window-active-style \"fg=$active_pane_fg,bg=$active_pane_bg\"'"


